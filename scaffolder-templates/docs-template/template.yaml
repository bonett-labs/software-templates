apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: manipulacao-arquivos-yaml
  title: Manipulate YAML
  description: Repo do componente + PR de catalog-info.yaml em repositório central
  tags:
    - yaml
    - yml

spec:
  owner: tribe-web-platforms
  type: website

  parameters:
    - title: Identidade do Componente
      required: [owner, domain, system]
      properties:
        owner:
          title: Dono (Grupo)
          type: string
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              - kind: Group

        domain:
          title: Domínio de Negócio
          type: string
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              - kind: Domain

        system:
          title: Sistema
          type: string
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              - kind: System

    - title: Dados do Componente
      required: [name, description]
      properties:
        name:
          title: Nome (component_id)
          type: string
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
          description: "Use kebab-case, ex: billing-api"

        description:
          title: Descrição do componente
          type: string
          ui:widget: textarea
          ui:options:
            rows: 4

  steps:
    - id: resolve-system-prefix
      name: Resolver sigla do sistema
      action: roadiehq:utils:jsonata
      input:
        data:
          system: ${{ parameters.system }}
          componentName: ${{ parameters.name }}
        expression: >
          {
            "systemSlug": $replace(system, "system:default/", ""),
            "systemPrefix": $split($replace(system, "system:default/", ""), "-")[0],
            "repositoryName": $split($replace(system, "system:default/", ""), "-")[0] & "-" & componentName
          }

    - id: fetch-template
      name: Buscar Template (componente)
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: template
        values:
          component_id: ${{ parameters.name }}
          name: ${{ parameters.name }}
          repository_name: ${{ steps['resolve-system-prefix'].output.result.repositoryName }}
          system_prefix: ${{ steps['resolve-system-prefix'].output.result.systemPrefix }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          domain: ${{ parameters.domain }}
          system: ${{ parameters.system }}

    - id: publish
      name: Publicar repositório no GitHub
      action: publish:github
      input:
        sourcePath: ./template
        repoUrl: github.com?owner=bonett-labs&repo=${{ steps['resolve-system-prefix'].output.result.repositoryName }}
        description: ${{ parameters.description }}
        defaultBranch: main
        repoVisibility: private

    - id: wait-2sec
      action: debug:wait
      name: Espera
      input:
        seconds: 2

    - id: fetch-metadata
      name: Prepare Metadata (catálogo central)
      action: fetch:template
      input:
        url: ./metadata
        targetPath: ./metadata-output
        values:
          component_id: ${{ parameters.name }}
          name: ${{ parameters.name }}
          repository_name: ${{ steps['resolve-system-prefix'].output.result.repositoryName }}
          system_prefix: ${{ steps['resolve-system-prefix'].output.result.systemPrefix }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          domain: ${{ parameters.domain }}
          system: ${{ parameters.system }}
          system_slug: ${{ steps['resolve-system-prefix'].output.result.systemSlug }}

    - id: rename-metadata
      name: Rename Metadata File
      action: fs:rename
      input:
        files:
          - from: ./metadata-output/catalog-info.yaml
            to: ./metadata-output/${{ parameters.name }}/${{ parameters.name }}.yaml

    - id: publish-metadata
      name: Criar Metadata PR (repo central)
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=bonettech-zentry-components&owner=bonett-labs
        branchName: add-${{ parameters.name }}
        title: "feat: Add ${{ parameters.name }}"
        description: |
          ## 🎉 Novo Componente: ${{ parameters.name }}

          **Sistema:** ${{ parameters.system }}
          **Sigla:** ${{ steps['resolve-system-prefix'].output.result.systemPrefix }}
          **Repositório:** ${{ steps['resolve-system-prefix'].output.result.repositoryName }}
          **Owner:** ${{ parameters.owner }}
          **Descrição:** ${{ parameters.description }}

          ### 📁 Arquivo criado:
          `${{ steps['resolve-system-prefix'].output.result.systemSlug }}/${{ parameters.name }}.yaml`

          🚀 Faça merge para aparecer no catálogo.
        sourcePath: metadata-output/${{ parameters.name }}
        targetPath: ${{ steps['resolve-system-prefix'].output.result.systemSlug }}

  output:
    links:
      - title: 📦 Code Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: 👉 Pull Request (catálogo central)
        url: ${{ steps['publish-metadata'].output.remoteUrl }}
